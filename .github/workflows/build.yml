name: 打包DJI下单工具

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
      
      - name: 打包
        shell: cmd
        run: |
          python -c "from playwright.sync_api import sync_playwright; import json; p = sync_playwright().start(); path = p.chromium.executable_path; p.stop(); print(path)" > browser_path.txt
          set /p BROWSER_PATH=<browser_path.txt
          for %%F in ("%BROWSER_PATH%") do set BROWSER_DIR=%%~dpF
          pyinstaller --onefile --name DJI下单工具 --add-data "%BROWSER_DIR%;playwright/driver/chrome-win" --hidden-import playwright --hidden-import playwright.sync_api dji_order.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: DJI下单工具-Windows版
          path: dist/DJI下单工具.exe
